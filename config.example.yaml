# Copy to config.yaml and fill in.  config.yaml is yours to edit; this file is the template.

paths:
  # The resume_creator project (your existing resume builder).
  resume_creator: "../resume_creator"
  # Master resume data that every tailored resume starts from.
  master_resume_data: "../resume_creator/resume-data/resume-data.json"
  # The HTML page Playwright loads to render the resume.
  resume_html: "../resume_creator/index.html"
  # Where runtime data lives (DB, generated PDFs, captures, tracker).
  data_dir: "./data"
  # Excel application tracker.
  tracker_xlsx: "./data/applications.xlsx"

claude:
  backend: "cli"               # "cli" = run via your Claude subscription (no API credits); "api" = pay-per-token
  cli_command: "claude"        # the Claude Code executable (used only when backend = cli)
  model: "claude-sonnet-4-6"   # tailoring model; swap to claude-opus-4-8 for max quality
  max_tokens: 8000             # used only when backend = api
  # ANTHROPIC_API_KEY (env / .env) is only needed when backend = api.

server:
  host: "127.0.0.1"
  port: 8765
  # If true, capturing a job immediately runs tailoring + render in the background.
  # If false, you run `python run.py process` manually (more control over API spend).
  auto_process: true

# ─────────────────────────────────────────────────────────────────────────────
# YOUR JOB CRITERIA  — you said you'd provide these. Fill them in; the fit-scorer
# uses them to rate each captured job 0-100 so the best ones float to the top of
# your review queue. Nothing here filters jobs out; it only scores and sorts.
# ─────────────────────────────────────────────────────────────────────────────
criteria:
  titles: []          # e.g. ["Software Engineer", "Backend Engineer", "ML Engineer"]
  locations: []       # e.g. ["Remote", "Berlin", "Hungary"]
  arrangement: []     # any of: remote, hybrid, on-site
  seniority: ""       # e.g. "junior" | "mid" | "senior"
  must_have: []       # hard wants, weighted heavily, e.g. ["Python", "remote"]
  nice_to_have: []    # soft wants, e.g. ["Kubernetes", "startup"]
  avoid: []           # red flags that lower the score, e.g. ["on-call", "PHP"]
  languages: []       # spoken languages, e.g. ["English", "German"]
  salary_floor: null  # number in your currency, or null
  notes: ""           # free-text guidance passed to the fit-scorer

# ─────────────────────────────────────────────────────────────────────────────
# JOB-BOARD APIs (automated sourcing — no login, no scraping, no ban risk).
# This is the default source used by `python run.py`.
# ─────────────────────────────────────────────────────────────────────────────
jobapis:
  # "linkedin" = LinkedIn's PUBLIC guest API (server-side, no login, no ban). Uses
  # keywords as searches + your criteria for filters. "remotive"/"arbeitnow"/"remoteok"
  # match keywords against the job TITLE.
  enabled: ["linkedin", "remotive", "arbeitnow"]
  keywords: []                        # search terms / title match; empty = criteria.titles
  max_per_source: 30                  # cap per provider per run
  # linkedin filters reuse: linkedin.geo_id, linkedin.date_posted, criteria.arrangement, criteria.seniority

# ─────────────────────────────────────────────────────────────────────────────
# LINKEDIN SCRAPER (DISCOURAGED — LinkedIn restricts/bans automated access).
# Kept only as an optional manual tool; not used by `python run.py` anymore.
# ─────────────────────────────────────────────────────────────────────────────
linkedin:
  # Searches are BUILT from your criteria — one search per title — so you don't
  # paste filter links. keywords default to criteria.titles; work-type comes from
  # criteria.arrangement (remote/hybrid/on-site) and level from criteria.seniority.
  keywords: []                       # override the search terms (else uses criteria.titles)
  geo_id: "91000000"                 # 91000000 = European Union. To target a country/city,
                                     # set the location on LinkedIn Jobs and copy geoId from the URL.
  date_posted: "24h"                 # 24h | 3d | week | month
  browser_channel: "chrome"          # real Chrome dodges CAPTCHA detection; "" = bundled Chromium
  searches: []                       # optional: explicit full URLs that OVERRIDE the built ones
  profile_dir: "./data/linkedin_profile"  # persistent burner session (gitignored)
  max_jobs_per_search: 25            # cap per search per run
  headless: true                     # set false to watch the browser on first run
  min_delay: 2.0                     # seconds between actions (human-like pacing)
  max_delay: 5.0
  debug: false                       # true = screenshot failed extractions to data/debug/
